<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop AI Tester | Shell Methodology</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .steps-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3rem;
            position: relative;
        }

        .steps-nav::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border);
            z-index: 0;
            transform: translateY(-50%);
        }

        .step-node {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg);
            border: 2px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            z-index: 1;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .step-node.active {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            color: var(--primary);
        }

        .step-node.completed {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .step-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .step-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px var(--primary-glow);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px;
            border: 1px solid var(--border);
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }

        .result-box.active {
            display: block;
        }

        pre {
            font-size: 0.85rem;
            color: #10b981;
            white-space: pre-wrap;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .forces-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .force-chip {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .force-chip span {
            cursor: pointer;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Workshop AI Tester</h1>
            <p class="subtitle">Shell Methodology Strategic Scenario Planning</p>
        </header>

        <div class="steps-nav">
            <div class="step-node active" data-step="1">1</div>
            <div class="step-node" data-step="2">2</div>
            <div class="step-node" data-step="3">3</div>
            <div class="step-node" data-step="4">4</div>
            <div class="step-node" data-step="5">5</div>
        </div>

        <!-- Step 1: Classify -->
        <div class="step-content active" id="content-1">
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" id="company-name" placeholder="e.g. AlWasl Capital">
            </div>
            <div class="form-group">
                <label>Industry</label>
                <input type="text" id="company-industry" placeholder="e.g. Finance">
            </div>
            <div class="form-group">
                <label>Company Summary (Context for AI)</label>
                <textarea id="company-summary" placeholder="e.g. AlWasl Capital is a mid-sized UAE financial firm focused on HNW clients..."></textarea>
            </div>
            <div class="form-group">
                <label>Focal Strategic Question</label>
                <textarea id="company-focal-question" placeholder="e.g. Should AlWasl invest in a retail digital wealth platform or double down on relationship banking?"></textarea>
            </div>
            <div class="form-group">
                <label>Add Driving Forces (Enter to add)</label>
                <input type="text" id="force-input" placeholder="e.g. AI adoption">
                <div class="forces-list" id="forces-container"></div>
            </div>
            <button class="btn" id="btn-1">
                <span>Begin Classification</span>
                <div class="loader"></div>
            </button>
        </div>

        <!-- Step 2: Axes -->
        <div class="step-content" id="content-2">
            <div class="form-group">
                <label>Focal Question</label>
                <input type="text" id="focal-question" placeholder="e.g. Should we pivot to digital?">
            </div>
            <div class="form-group" style="display: flex; gap: 1rem;">
                <div style="flex: 1;">
                    <label>Horizon Month (Number)</label>
                    <input type="number" id="horizon-month" placeholder="e.g. 3">
                </div>
                <div style="flex: 1;">
                    <label>Horizon Year</label>
                    <input type="number" id="horizon-year" value="2030">
                </div>
            </div>
            <p style="color: var(--text-muted); margin-bottom: 1rem; font-size: 0.9rem;">The AI has identified the uncertainties from Step 1. Ready to select axes.</p>
            <button class="btn" id="btn-2">
                <span>Select Scenario Axes</span>
                <div class="loader"></div>
            </button>
        </div>

        <!-- Step 3: Scenarios -->
        <div class="step-content" id="content-3">
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Axes selected. Ready to build 4 scenario narratives.</p>
            <button class="btn" id="btn-3">
                <span>Generate Scenario Narratives</span>
                <div class="loader"></div>
            </button>
        </div>

        <!-- Step 4: Wind Tunnel -->
        <div class="step-content" id="content-4">
            <div class="form-group">
                <label>Strategic Options (One per line)</label>
                <textarea id="options-input" placeholder="Invest in AI&#10;Stay traditional&#10;Hybrid model"></textarea>
            </div>
            <button class="btn" id="btn-4">
                <span>Run Wind Tunnel Test</span>
                <div class="loader"></div>
            </button>
        </div>

        <!-- Step 5: Report -->
        <div class="step-content" id="content-5">
            <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Testing complete. Ready to generate final executive report.</p>
            <button class="btn" id="btn-5">
                <span>Generate Executive Report</span>
                <div class="loader"></div>
            </button>
        </div>

        <div class="result-box" id="result-box">
            <h3 style="font-size: 0.9rem; margin-bottom: 1rem; color: var(--primary);">SERVER RESPONSE:</h3>
            <pre id="json-result"></pre>
        </div>
    </div>

    <script src="/scripts.js"></script>
</body>
</html>

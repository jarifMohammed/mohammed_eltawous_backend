<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1: Classify Forces | AlWasl Workshop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header { margin-bottom: 2rem; }
        h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text); }
        .subtitle { color: var(--text-muted); font-size: 1rem; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .field { display: flex; flex-direction: column; gap: 0.5rem; }
        .field.full { grid-column: span 2; }

        label { font-size: 0.875rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        
        input, textarea {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
            display: none; /* Hidden until API result */
        }

        .column {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 0.75rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
        }

        .column h3 { margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; font-size: 1.1rem; }
        .column.predetermined h3 { color: var(--success); }
        .column.uncertainties h3 { color: var(--warning); }

        .force-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .force-item span { font-size: 0.95rem; }
        
        .action-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .action-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }

        .loader {
            display: none;
            margin: 1rem auto;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Step 1: Classify Driving Forces</h1>
            <p class="subtitle">Separate the certainties from the critical uncertainties.</p>
        </header>

        <section class="glass-card">
            <div class="form-grid">
                <div class="field">
                    <label>Company Name</label>
                    <input type="text" id="companyName" value="AlWasl Capital">
                </div>
                <div class="field">
                    <label>Horizon Year</label>
                    <input type="text" id="horizonYear" value="2030">
                </div>
                <div class="field full">
                    <label>Focal Strategic Question</label>
                    <input type="text" id="focalQuestion" value="Should we build a retail digital wealth platform or double down on relationship banking?">
                </div>
                <div class="field full">
                    <label>Driving Forces (One per line)</label>
                    <textarea id="forces" rows="6">Regulatory environment (CBUAE/DFSA)
Generational wealth transfer
Oil price volatility
Competition from global fintechs
Local talent scarcity</textarea>
                </div>
            </div>
            
            <button id="classifyBtn" onclick="runClassification()">
                <span>Classify Forces</span>
                <div class="loader" id="loader"></div>
            </button>
        </section>

        <section class="columns" id="resultsSection">
            <div class="column predetermined">
                <h3>● Predetermined Elements</h3>
                <div id="predeterminedList"></div>
            </div>
            <div class="column uncertainties">
                <h3>▲ Critical Uncertainties</h3>
                <div id="uncertaintiesList"></div>
            </div>
            
            <div style="grid-column: span 2; display: flex; justify-content: flex-end; margin-top: 1rem;">
                <button style="background: var(--success);" onclick="saveAndContinue()">Save & Continue to Axes →</button>
            </div>
        </section>
    </div>

    <script>
        async function runClassification() {
            const btn = document.getElementById('classifyBtn');
            const loader = document.getElementById('loader');
            const results = document.getElementById('resultsSection');
            
            const payload = {
                sessionId: localStorage.getItem('workshop_session_id') || undefined,
                company: {
                    name: document.getElementById('companyName').value,
                    focalQuestion: document.getElementById('focalQuestion').value,
                    horizonYear: document.getElementById('horizonYear').value
                },
                forces: document.getElementById('forces').value.split('\n').filter(l => l.trim()),
                conversationHistory: []
            };

            btn.disabled = true;
            loader.style.display = 'block';

            try {
                const response = await fetch('/api/v1/workshop/classify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (result.sessionId) {
                    localStorage.setItem('workshop_session_id', result.sessionId);
                }

                if (result.success) {
                    renderResults(result.data);
                    results.style.display = 'grid';
                    // Persist for next step
                    localStorage.setItem('workshop_session_id', result.sessionId);
                    localStorage.setItem('workshop_company', JSON.stringify(payload.company));
                    localStorage.setItem('workshop_classification', JSON.stringify(result.data));
                    localStorage.setItem('workshop_forces', JSON.stringify(payload.forces));
                    localStorage.setItem('workshop_history', JSON.stringify(result.history));
                } else {
                    alert('Error: ' + (result.message || result.error || 'Request failed'));
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        function saveAndContinue() {
            window.location.href = 'step2_axes.html';
        }

        function renderResults(data) {
            const predList = document.getElementById('predeterminedList');
            const uncertList = document.getElementById('uncertaintiesList');
            
            predList.innerHTML = data.predetermined.map(item => `
                <div class="force-item">
                    <span>${typeof item === 'string' ? item : item.force}</span>
                    <button class="action-btn" onclick="moveItem(this, 'uncertainties')">Move →</button>
                </div>
            `).join('');

            uncertList.innerHTML = data.uncertainties.map(item => `
                <div class="force-item">
                    <button class="action-btn" onclick="moveItem(this, 'predetermined')">← Move</button>
                    <span>${typeof item === 'string' ? item : item.force}</span>
                </div>
            `).join('');
        }

        function moveItem(btn, target) {
            const item = btn.parentElement;
            const targetList = document.getElementById(target + 'List');
            
            // Toggle button text and position
            if (target === 'uncertainties') {
                btn.innerText = '← Move';
                btn.setAttribute('onclick', "moveItem(this, 'predetermined')");
                item.prepend(btn);
            } else {
                btn.innerText = 'Move →';
                btn.setAttribute('onclick', "moveItem(this, 'uncertainties')");
                item.append(btn);
            }
            
            targetList.appendChild(item);
        }
    </script>
</body>
</html>
